services:
  - type: web
    name: my-commerce-backend
    env: python
    buildCommand: |
      pip install -r requirements.txt
      playwright install chromium
      playwright install-deps
    startCommand: uvicorn main:app --host 0.0.0.0 --port 10001
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
